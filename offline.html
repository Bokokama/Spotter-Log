<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0B1F30">
<title>SPOTTER LOG - Offline</title>
<style>
  :root {
    color-scheme: dark;
    --navy: #02090E;
    --navy2: #0A1722;
    --amber: #FFB627;
    --concrete: #93A5B0;
    --white: #F3F6F8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    background: var(--navy);
    color: var(--white);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  main {
    width: min(460px, 100%);
    border-top: 3px solid var(--amber);
    background: var(--navy2);
    padding: 24px 20px;
  }
  .eyebrow {
    margin: 0 0 8px;
    color: var(--amber);
    font-size: 12px;
    letter-spacing: .22em;
    text-transform: uppercase;
  }
  h1 {
    margin: 0 0 12px;
    font-size: 28px;
    line-height: 1.1;
  }
  p {
    margin: 0;
    color: var(--concrete);
    line-height: 1.7;
  }
</style>
</head>
<body>
<main>
  <p class="eyebrow">Offline</p>
  <h1>SPOTTER LOG</h1>
  <p>現在オフラインです。インストール済みのアプリ本体が表示できない場合は、通信が戻ってからもう一度開いてください。</p>
</main>
</body>
</html>
