<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0B1F30">
<meta name="color-scheme" content="dark">
<title>SPOTTER LOG</title>
<link rel="shortcut icon" id="favicon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈</text></svg>">
<link rel="manifest" id="manifest-link">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  :root{ color-scheme: dark; }
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Archivo:wght@500;700;900&display=swap');

  :root{
    --navy:#02090E;
    --navy2:#0A1722;
    --navy3:#10283B;
    --amber:#FFB627;
    --concrete:#93A5B0;
    --white:#F3F6F8;
    --red:#E5572B;
    --line:rgba(255,255,255,0.09);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{ -webkit-tap-highlight-color: transparent; }
  body{
    background:var(--navy);
    color:var(--white);
    font-family:'Archivo', sans-serif;
    min-height:100vh;
    padding-bottom:90px;
  }

  /* Header */
  header{
    padding:22px 16px 16px;
    border-bottom:2px solid var(--amber);
    position:relative;
    overflow:hidden;
  }
  header::after{
    content:"";
    position:absolute;
    top:-10px; right:10px;
    width:160px; height:160px;
    border:1px solid var(--line);
    border-radius:50%;
  }
  .eyebrow{
    font-family:'Space Mono', monospace;
    font-size:11px;
    letter-spacing:0.25em;
    color:var(--amber);
    text-transform:uppercase;
    margin-bottom:4px;
  }
  h1{ font-size:26px; font-weight:900; letter-spacing:0.02em; }
  .backup-line{
    font-family:'Space Mono', monospace;
    font-size:11px;
    color:var(--concrete);
    margin-top:8px;
  }

  /* Toolbar */
  .toolbar{
    padding:12px 16px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .search-input{
    flex:1;
    background:var(--navy2);
    border:1px solid var(--line);
    border-radius:8px;
    padding:10px 40px 10px 12px;
    color:var(--white);
    font-family:'Space Mono', monospace;
    font-size:13px;
    outline:none;
    width:100%;
  }
  .search-input:focus{ border-color:var(--amber); }

  .tabbar{
    display:flex;
    gap:8px;
    flex:1;
    overflow-x:auto;
  }
  .tab{
    flex-shrink:0;
    font-family:'Space Mono', monospace;
    font-size:11px;
    padding:7px 14px;
    border-radius:20px;
    border:1px solid var(--line);
    background:var(--navy2);
    color:var(--concrete);
    cursor:pointer;
  }
  .tab.active{
    background:var(--amber);
    color:var(--navy);
    border-color:var(--amber);
    font-weight:700;
  }

  .backupbar{
    display:flex;
    gap:8px;
    margin:0 16px 12px;
    flex-wrap: wrap;
  }
  .backupbar button, .backupbar label{
    flex:1;
    min-width: 130px;
    text-align:center;
    font-family:'Space Mono', monospace;
    font-size:11px;
    padding:9px 8px;
    border-radius:6px;
    border:1px solid var(--line);
    background:var(--navy2);
    color:var(--concrete);
    cursor:pointer;
  }
  .backupbar input[type=file]{ display:none; }

  .stats{
    display:flex;
    gap:1px;
    background:var(--line);
    border-bottom:1px solid var(--line);
    margin-bottom:4px;
  }
  .stat{ flex:1; background:var(--navy); padding:10px 8px; text-align:center; }
  .stat .num{ font-family:'Space Mono', monospace; font-size:18px; font-weight:700; color:var(--amber); }
  .stat .label{ font-size:9px; color:var(--concrete); text-transform:uppercase; }

  /* Grid */
  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:0 16px 16px;
  }
  .card{
    background:var(--navy2);
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
  }
  .card .thumb{
    width:100%;
    aspect-ratio:3/2;
    background:var(--navy3);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .card .thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .card .info{
    padding:6px 8px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .card .reg{ font-family:'Space Mono', monospace; color:var(--amber); font-size:13px; }

  .fab{
    position:fixed;
    bottom:22px; right:20px;
    width:58px; height:58px;
    border-radius:50%;
    background:var(--amber);
    color:var(--navy);
    border:none;
    font-size:28px;
    font-weight:900;
    box-shadow:0 4px 14px rgba(0,0,0,0.4);
    cursor:pointer;
    z-index:50;
  }

  /* Modal */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:100;
  }
  .modal-overlay.show{ display:flex; }
  .modal{
    background:var(--navy2);
    border-top:2px solid var(--amber);
    border-radius:14px 14px 0 0;
    width:100%;
    max-width:480px;
    padding:18px;
    padding-bottom:28px;
  }
  .modal-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .modal-header h2{ font-size:13px; color:var(--amber); }
  .modal-close{ background:none; border:none; color:var(--concrete); font-size:22px; cursor:pointer; }
  
  .row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
  .field{ display:flex; flex-direction:column; gap:5px; }
  label{ font-size:10px; color:var(--concrete); text-transform:uppercase; }
  input{
    background:var(--navy);
    border:1px solid var(--line);
    border-radius:6px;
    padding:9px 10px;
    color:var(--white);
    font-family:'Space Mono', monospace;
    font-size:13px;
    width:100%;
    outline:none;
  }

  .photozone{
    border:1px dashed var(--line);
    border-radius:8px;
    padding:20px;
    text-align:center;
    cursor:pointer;
    margin-bottom:14px;
    background:var(--navy);
  }
  .photozone img{ width:100%; aspect-ratio:3/2; object-fit:cover; display:block; border-radius:6px; }
  .ph-text{ font-family:'Space Mono', monospace; font-size:12px; color:var(--concrete); }

  .modal-actions{ display:flex; gap:10px; margin-top:14px; }
  .modal-actions button{ flex:1; border:none; border-radius:6px; padding:12px; font-weight:900; cursor:pointer; }
  .modal-actions .save{ background:var(--amber); color:var(--navy); }
  .modal-actions .delete{ background:transparent; color:var(--red); border:1px solid var(--red); }

  @media (min-width:768px){
    .grid{ grid-template-columns: repeat(3, 1fr); }
    .modal-overlay{ align-items:center; }
    .modal{ border-radius:14px; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">// REGISTRATION COLLECTION LOG</div>
  <h1>SPOTTER LOG <span style="font-size:12px; color:var(--concrete);">v1.7.1</span></h1>
  <div class="backup-line" id="backup-line">バックアップ未実施</div>
</header>

<div class="backupbar">
  <button id="export-btn">⬇ JSON書き出し</button>
  <label for="import-file">⬆ JSON読み込み</label>
  <input type="file" id="import-file" accept="application/json">
  
  <label for="icon-file" style="background: var(--navy3); color: var(--amber); border-color: var(--amber);">🖼 アイコン設定</label>
  <input type="file" id="icon-file" accept="image/*">
</div>

<div class="stats" id="stats"></div>

<div class="grid" id="grid"></div>
<button class="fab" id="fab">+</button>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2>New Sighting</h2>
      <button class="modal-close" id="modal-close">×</button>
    </div>
    
    <div class="photozone" id="photozone">
      <input type="file" id="m-photo" accept="image/*" style="display:none">
      <div id="photo-display" class="ph-text">📷 タップして写真を選択</div>
    </div>

    <div class="row">
      <div class="field"><label>Registration</label><input type="text" id="m-reg" placeholder="JA8XXX" autocapitalize="characters"></div>
      <div class="field"><label>Date</label><input type="date" id="m-date"></div>
    </div>
    <div class="modal-actions">
      <button class="delete" id="modal-delete" style="display
